<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Book — RenewalEngineAI</title><style>body{font-family:Inter,system-ui;max-width:900px;margin:0 auto;padding:24px;background:#0f172a;color:#e2e8f0}input,textarea{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;box-sizing:border-box}input:focus,textarea:focus{outline:none;border-color:#4f46e5;box-shadow:0 0 0 2px rgba(79,70,229,0.3)}label{display:block;margin-top:16px;font-weight:600;color:#e2e8f0}button{background:#4f46e5;color:#ffffff;padding:12px 24px;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-top:16px;font-size:16px;transition:background 0.2s}button:hover{background:#4338ca}button:disabled{opacity:0.6;cursor:not-allowed}.success-msg{display:none;background:#065f46;color:#6ee7b7;padding:16px;border-radius:8px;margin-top:16px;font-weight:600}.back-link{color:#818cf8;text-decoration:none;font-weight:600;display:inline-block;margin-bottom:16px}.back-link:hover{color:#a5b4fc}</style></head><body>
<a href="/" class="back-link">&larr; RenewalEngineAI</a>
<h1>Book Discovery Call</h1>
<form id="intake-form">
<label>Name</label><input name="name" required />
<label>Email</label><input type="email" name="email" required />
<label>Agency Size (# of policies)</label><input name="agency_size" placeholder="e.g. 500" />
<label>Primary Ops Pain</label><textarea name="pain" rows="4" placeholder="What's your biggest operational challenge right now?"></textarea>
<button type="submit" id="submit-btn">Submit Intake</button>
</form>
<div class="success-msg" id="success-msg">Thanks! We'll be in touch within 24 hours to schedule your discovery call.</div>
<script>
document.getElementById('intake-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';
  // Collect form data
  var formData = new FormData(this);
  var data = {};
  formData.forEach(function(value, key) { data[key] = value; });
  // For now, show success (replace with actual API endpoint when ready)
  setTimeout(function() {
    document.getElementById('intake-form').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
  }, 800);
});
</script>
</body></html>
