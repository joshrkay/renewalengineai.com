<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Where Your Lapse Cost Actually Lives</title>
  <desc id="desc">A pyramid showing that 20 percent of your book drives 60 percent of your lapse cost, 60 percent of the book drives 30 percent, and the bottom 20 percent drives only 10 percent.</desc>

  <rect width="900" height="560" fill="#0a0a0a"/>

  <!-- header -->
  <text x="450" y="48" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="26" font-weight="900">Where Your Lapse Cost Actually Lives</text>
  <text x="450" y="76" text-anchor="middle" fill="#737373" font-family="system-ui, sans-serif" font-size="14">Segment your book before you build your retention plan</text>

  <!-- pyramid: top narrow, bottom wide, stacked trapezoids -->
  <!-- top: 20% of book / 60% of revenue -->
  <polygon points="400,115 500,115 540,195 360,195" fill="#2563eb" stroke="#60a5fa" stroke-width="2"/>
  <text x="450" y="150" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="900">TOP 20%</text>
  <text x="450" y="172" text-anchor="middle" fill="#dbeafe" font-family="system-ui, sans-serif" font-size="11">of the book</text>

  <!-- middle: 60% of book / 30% of revenue -->
  <polygon points="360,198 540,198 600,318 300,318" fill="#1e3a8a" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="245" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="900">MIDDLE 60%</text>
  <text x="450" y="267" text-anchor="middle" fill="#bfdbfe" font-family="system-ui, sans-serif" font-size="11">of the book</text>

  <!-- bottom: 20% of book / 10% of revenue -->
  <polygon points="300,321 600,321 660,440 240,440" fill="#1f2937" stroke="#475569" stroke-width="2"/>
  <text x="450" y="370" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="900">BOTTOM 20%</text>
  <text x="450" y="392" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="11">of the book</text>

  <!-- LEFT callouts: % of book -->
  <text x="170" y="135" text-anchor="start" fill="#737373" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1">CLIENT COUNT</text>
  <line x1="170" y1="145" x2="355" y2="155" stroke="#404040" stroke-width="1"/>
  <text x="170" y="170" fill="#e5e5e5" font-family="system-ui, sans-serif" font-size="13">160 clients</text>

  <line x1="170" y1="250" x2="295" y2="258" stroke="#404040" stroke-width="1"/>
  <text x="170" y="275" fill="#e5e5e5" font-family="system-ui, sans-serif" font-size="13">480 clients</text>

  <line x1="170" y1="370" x2="235" y2="380" stroke="#404040" stroke-width="1"/>
  <text x="170" y="395" fill="#e5e5e5" font-family="system-ui, sans-serif" font-size="13">160 clients</text>

  <!-- RIGHT callouts: % of lapse cost -->
  <text x="730" y="135" text-anchor="start" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1">SHARE OF LAPSE COST</text>
  <line x1="545" y1="155" x2="725" y2="145" stroke="#1e40af" stroke-width="1"/>
  <text x="730" y="170" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="900">60%</text>
  <text x="775" y="170" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="12">of the bleed</text>

  <line x1="605" y1="258" x2="725" y2="266" stroke="#1e40af" stroke-width="1"/>
  <text x="730" y="282" fill="#ffffff" font-family="system-ui, sans-serif" font-size="16" font-weight="900">30%</text>
  <text x="770" y="282" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="12">of the bleed</text>

  <line x1="665" y1="380" x2="725" y2="388" stroke="#1e40af" stroke-width="1"/>
  <text x="730" y="404" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="900">10%</text>
  <text x="770" y="404" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="12">of the bleed</text>

  <!-- verdict bar -->
  <rect x="100" y="470" width="700" height="60" rx="30" fill="#0c223d" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="498" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Spend 80% of your retention energy on the top 20% of the book.</text>
  <text x="450" y="518" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="13" font-style="italic">Everyone else gets the AI-drafted baseline sequence.</text>
</svg>
