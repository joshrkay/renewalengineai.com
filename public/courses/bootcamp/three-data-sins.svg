<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">The Three Data Sins</title>
  <desc id="desc">Three side by side panels showing the three most common data hygiene problems in an agency AMS export: missing fields, duplicate records, and inconsistent formatting.</desc>

  <rect width="900" height="500" fill="#0a0a0a"/>

  <!-- header -->
  <text x="450" y="48" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="26" font-weight="900">The Three Data Sins</text>
  <text x="450" y="76" text-anchor="middle" fill="#737373" font-family="system-ui, sans-serif" font-size="14">Fix these before AI touches a single record</text>

  <!-- SIN 1: Missing fields -->
  <rect x="40" y="110" width="260" height="320" rx="14" fill="#171717" stroke="#2563eb" stroke-width="2"/>
  <text x="170" y="145" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="2">SIN 1</text>
  <text x="170" y="172" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="17" font-weight="900">MISSING FIELDS</text>

  <!-- mock table -->
  <rect x="60" y="195" width="220" height="150" rx="6" fill="#0a0a0a" stroke="#262626" stroke-width="1"/>
  <line x1="60" y1="218" x2="280" y2="218" stroke="#262626" stroke-width="1"/>
  <text x="70" y="211" fill="#737373" font-family="system-ui, sans-serif" font-size="9">NAME</text>
  <text x="165" y="211" fill="#737373" font-family="system-ui, sans-serif" font-size="9">EMAIL</text>
  <text x="235" y="211" fill="#737373" font-family="system-ui, sans-serif" font-size="9">X-DATE</text>

  <text x="70" y="237" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="10">Smith, J.</text>
  <text x="165" y="237" fill="#f87171" font-family="system-ui, sans-serif" font-size="10">—</text>
  <text x="235" y="237" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="10">06/15</text>

  <text x="70" y="257" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="10">Garcia, M.</text>
  <text x="165" y="257" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="10">mg@…</text>
  <text x="235" y="257" fill="#f87171" font-family="system-ui, sans-serif" font-size="10">—</text>

  <text x="70" y="277" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="10">Chen, A.</text>
  <text x="165" y="277" fill="#f87171" font-family="system-ui, sans-serif" font-size="10">—</text>
  <text x="235" y="277" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="10">09/02</text>

  <text x="70" y="297" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="10">Nguyen, T.</text>
  <text x="165" y="297" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="10">tn@…</text>
  <text x="235" y="297" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="10">11/30</text>

  <text x="70" y="317" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="10">Patel, R.</text>
  <text x="165" y="317" fill="#f87171" font-family="system-ui, sans-serif" font-size="10">—</text>
  <text x="235" y="317" fill="#f87171" font-family="system-ui, sans-serif" font-size="10">—</text>

  <line x1="60" y1="330" x2="280" y2="330" stroke="#262626" stroke-width="1"/>

  <text x="170" y="375" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="12" font-weight="900">47% missing email</text>
  <text x="170" y="396" text-anchor="middle" fill="#a3a3a3" font-family="system-ui, sans-serif" font-size="11">AI can't send what it</text>
  <text x="170" y="412" text-anchor="middle" fill="#a3a3a3" font-family="system-ui, sans-serif" font-size="11">has no address for.</text>

  <!-- SIN 2: Duplicates -->
  <rect x="320" y="110" width="260" height="320" rx="14" fill="#171717" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="145" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="2">SIN 2</text>
  <text x="450" y="172" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="17" font-weight="900">DUPLICATES</text>

  <rect x="340" y="195" width="220" height="150" rx="6" fill="#0a0a0a" stroke="#262626" stroke-width="1"/>
  <text x="350" y="215" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="11">John Smith</text>
  <text x="540" y="215" text-anchor="end" fill="#737373" font-family="system-ui, sans-serif" font-size="10">ID 4421</text>

  <text x="350" y="238" fill="#f87171" font-family="system-ui, sans-serif" font-size="11">Smith, John</text>
  <text x="540" y="238" text-anchor="end" fill="#f87171" font-family="system-ui, sans-serif" font-size="10">ID 5809</text>

  <text x="350" y="261" fill="#f87171" font-family="system-ui, sans-serif" font-size="11">J. Smith</text>
  <text x="540" y="261" text-anchor="end" fill="#f87171" font-family="system-ui, sans-serif" font-size="10">ID 6112</text>

  <line x1="340" y1="275" x2="560" y2="275" stroke="#262626" stroke-width="1"/>
  <text x="350" y="298" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="11">Maria Garcia</text>
  <text x="540" y="298" text-anchor="end" fill="#737373" font-family="system-ui, sans-serif" font-size="10">ID 2201</text>

  <text x="350" y="321" fill="#f87171" font-family="system-ui, sans-serif" font-size="11">M Garcia</text>
  <text x="540" y="321" text-anchor="end" fill="#f87171" font-family="system-ui, sans-serif" font-size="10">ID 7710</text>

  <text x="450" y="375" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="12" font-weight="900">Same client, 3 rows</text>
  <text x="450" y="396" text-anchor="middle" fill="#a3a3a3" font-family="system-ui, sans-serif" font-size="11">Clients get the same email</text>
  <text x="450" y="412" text-anchor="middle" fill="#a3a3a3" font-family="system-ui, sans-serif" font-size="11">3x and hate you.</text>

  <!-- SIN 3: Inconsistent format -->
  <rect x="600" y="110" width="260" height="320" rx="14" fill="#171717" stroke="#2563eb" stroke-width="2"/>
  <text x="730" y="145" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="2">SIN 3</text>
  <text x="730" y="172" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="17" font-weight="900">INCONSISTENT</text>

  <rect x="620" y="195" width="220" height="150" rx="6" fill="#0a0a0a" stroke="#262626" stroke-width="1"/>
  <text x="630" y="215" fill="#737373" font-family="system-ui, sans-serif" font-size="9">X-DATE FIELD</text>

  <text x="630" y="238" fill="#f87171" font-family="system-ui, sans-serif" font-size="11">06/15/2026</text>
  <text x="630" y="261" fill="#f87171" font-family="system-ui, sans-serif" font-size="11">June 15, 26</text>
  <text x="630" y="284" fill="#f87171" font-family="system-ui, sans-serif" font-size="11">2026-06-15</text>
  <text x="630" y="307" fill="#f87171" font-family="system-ui, sans-serif" font-size="11">15/06/26</text>
  <text x="630" y="330" fill="#f87171" font-family="system-ui, sans-serif" font-size="11">6-15</text>

  <text x="730" y="375" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="12" font-weight="900">Five formats, one field</text>
  <text x="730" y="396" text-anchor="middle" fill="#a3a3a3" font-family="system-ui, sans-serif" font-size="11">Triggers fire on the</text>
  <text x="730" y="412" text-anchor="middle" fill="#a3a3a3" font-family="system-ui, sans-serif" font-size="11">wrong day (or never).</text>

  <!-- bottom -->
  <text x="450" y="465" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Fix all three before automation. Otherwise you're just broadcasting broken messages faster.</text>
</svg>
