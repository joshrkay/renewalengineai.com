<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 540" role="img" aria-labelledby="title desc">
  <title id="title">The Document Extraction Pipeline</title>
  <desc id="desc">A four-step workflow for turning unstructured carrier PDFs into clean, structured rows your AMS can ingest.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="950" height="540" fill="#0a0a0a"/>

  <!-- header -->
  <text x="475" y="48" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="26" font-weight="900">The Document Extraction Pipeline</text>
  <text x="475" y="76" text-anchor="middle" fill="#737373" font-family="system-ui, sans-serif" font-size="14">Turn a 40-page carrier statement into structured rows in 90 seconds</text>

  <!-- STEP 1: PDF arrives -->
  <rect x="50" y="140" width="180" height="220" rx="14" fill="#171717" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="170" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="2">STEP 1</text>
  <text x="140" y="195" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">PDF Arrives</text>

  <!-- mock pdf icon -->
  <rect x="90" y="215" width="100" height="110" rx="4" fill="#0a0a0a" stroke="#525252" stroke-width="2"/>
  <line x1="100" y1="235" x2="180" y2="235" stroke="#404040" stroke-width="2"/>
  <line x1="100" y1="248" x2="170" y2="248" stroke="#404040" stroke-width="2"/>
  <line x1="100" y1="261" x2="175" y2="261" stroke="#404040" stroke-width="2"/>
  <line x1="100" y1="274" x2="160" y2="274" stroke="#404040" stroke-width="2"/>
  <line x1="100" y1="287" x2="170" y2="287" stroke="#404040" stroke-width="2"/>
  <line x1="100" y1="300" x2="165" y2="300" stroke="#404040" stroke-width="2"/>
  <text x="140" y="345" text-anchor="middle" fill="#a3a3a3" font-family="system-ui, sans-serif" font-size="11">40-page carrier stmt</text>

  <line x1="235" y1="250" x2="270" y2="250" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STEP 2: AI extract -->
  <rect x="275" y="140" width="180" height="220" rx="14" fill="#171717" stroke="#2563eb" stroke-width="2"/>
  <text x="365" y="170" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="2">STEP 2</text>
  <text x="365" y="195" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">AI Extract</text>

  <!-- brain-like circle -->
  <circle cx="365" cy="265" r="48" fill="#0a0a0a" stroke="#2563eb" stroke-width="2"/>
  <text x="365" y="260" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="12" font-weight="900">Claude</text>
  <text x="365" y="278" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="10">reads PDF</text>

  <text x="365" y="340" text-anchor="middle" fill="#a3a3a3" font-family="system-ui, sans-serif" font-size="11">Strict schema prompt</text>

  <line x1="460" y1="250" x2="495" y2="250" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STEP 3: Structured data -->
  <rect x="500" y="140" width="180" height="220" rx="14" fill="#171717" stroke="#2563eb" stroke-width="2"/>
  <text x="590" y="170" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="2">STEP 3</text>
  <text x="590" y="195" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Structured Rows</text>

  <!-- mock table -->
  <rect x="515" y="210" width="150" height="118" rx="4" fill="#0a0a0a" stroke="#404040" stroke-width="1"/>
  <line x1="515" y1="228" x2="665" y2="228" stroke="#404040" stroke-width="1"/>
  <text x="522" y="223" fill="#737373" font-family="system-ui, sans-serif" font-size="8">POLICY</text>
  <text x="580" y="223" fill="#737373" font-family="system-ui, sans-serif" font-size="8">X-DATE</text>
  <text x="630" y="223" fill="#737373" font-family="system-ui, sans-serif" font-size="8">PREM</text>

  <text x="522" y="244" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">P-4421</text>
  <text x="580" y="244" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">06-15</text>
  <text x="630" y="244" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">$1,240</text>

  <text x="522" y="260" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">P-5809</text>
  <text x="580" y="260" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">09-02</text>
  <text x="630" y="260" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">$890</text>

  <text x="522" y="276" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">P-6112</text>
  <text x="580" y="276" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">11-30</text>
  <text x="630" y="276" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">$2,110</text>

  <text x="522" y="292" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">P-7710</text>
  <text x="580" y="292" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">04-18</text>
  <text x="630" y="292" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">$1,580</text>

  <text x="522" y="308" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">P-8033</text>
  <text x="580" y="308" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">07-22</text>
  <text x="630" y="308" fill="#d4d4d4" font-family="system-ui, sans-serif" font-size="9">$945</text>

  <text x="590" y="345" text-anchor="middle" fill="#a3a3a3" font-family="system-ui, sans-serif" font-size="11">Validated JSON</text>

  <line x1="685" y1="250" x2="720" y2="250" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STEP 4: AMS write -->
  <rect x="725" y="140" width="180" height="220" rx="14" fill="#0c223d" stroke="#2563eb" stroke-width="2"/>
  <text x="815" y="170" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="2">STEP 4</text>
  <text x="815" y="195" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">AMS Write</text>

  <!-- AMS box -->
  <rect x="745" y="215" width="140" height="110" rx="6" fill="#0a0a0a" stroke="#2563eb" stroke-width="2"/>
  <text x="815" y="250" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="13" font-weight="900">AMS</text>
  <text x="815" y="272" text-anchor="middle" fill="#dbeafe" font-family="system-ui, sans-serif" font-size="10">via Zapier</text>
  <text x="815" y="290" text-anchor="middle" fill="#dbeafe" font-family="system-ui, sans-serif" font-size="10">or CSV import</text>
  <line x1="755" y1="303" x2="875" y2="303" stroke="#1e40af" stroke-width="1"/>
  <text x="815" y="318" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">5 rows posted</text>

  <text x="815" y="345" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="11" font-style="italic">Human reviews flags only</text>

  <!-- time bar -->
  <text x="475" y="395" text-anchor="middle" fill="#737373" font-family="system-ui, sans-serif" font-size="11" letter-spacing="1">TOTAL TIME</text>
  <rect x="250" y="405" width="450" height="26" rx="13" fill="#0c223d" stroke="#2563eb" stroke-width="1"/>
  <text x="475" y="424" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">90 seconds (was 2 hours)</text>

  <!-- footer -->
  <rect x="150" y="455" width="650" height="60" rx="30" fill="#0c223d" stroke="#2563eb" stroke-width="2"/>
  <text x="475" y="483" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Always validate — never auto-post without a human spot-check of 10% of rows.</text>
  <text x="475" y="503" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="12" font-style="italic">AI is the typist. You are the proofreader. Never flip those roles.</text>
</svg>
