<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" role="img" aria-labelledby="title desc">
  <title id="title">The AI Tool Hype Filter</title>
  <desc id="desc">Four sequential questions every AI tool must survive before you open your wallet. Each filter has a walk-away branch.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowred" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7f1d1d"/>
    </marker>
  </defs>

  <rect width="900" height="580" fill="#0a0a0a"/>

  <!-- header -->
  <text x="450" y="46" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="26" font-weight="900">The AI Tool Hype Filter</text>
  <text x="450" y="72" text-anchor="middle" fill="#737373" font-family="system-ui, sans-serif" font-size="14">Four walk-away gates before a new tool gets a minute of your time</text>

  <!-- ENTRY -->
  <rect x="330" y="95" width="240" height="48" rx="24" fill="#171717" stroke="#60a5fa" stroke-width="2"/>
  <text x="450" y="125" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">New tool pitched at your agency</text>

  <!-- arrow to Q1 -->
  <line x1="450" y1="143" x2="450" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Q1 -->
  <rect x="280" y="175" width="340" height="56" rx="10" fill="#171717" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="199" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="10" font-weight="900" letter-spacing="2">FILTER 1</text>
  <text x="450" y="219" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Does my AMS have an open API?</text>

  <!-- Q1 no to walk away -->
  <line x1="620" y1="203" x2="735" y2="203" stroke="#7f1d1d" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="670" y="196" fill="#f87171" font-family="system-ui, sans-serif" font-size="10" font-weight="700">NO</text>
  <rect x="740" y="180" width="140" height="48" rx="24" fill="#1a0c0c" stroke="#7f1d1d" stroke-width="2"/>
  <text x="810" y="210" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="12" font-weight="900">WALK AWAY</text>

  <!-- arrow to Q2 -->
  <line x1="450" y1="231" x2="450" y2="258" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="250" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="10" font-weight="700">YES</text>

  <!-- Q2 -->
  <rect x="280" y="263" width="340" height="56" rx="10" fill="#171717" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="287" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="10" font-weight="900" letter-spacing="2">FILTER 2</text>
  <text x="450" y="307" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">14-day trial, no credit card?</text>

  <line x1="280" y1="291" x2="165" y2="291" stroke="#7f1d1d" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="220" y="284" fill="#f87171" font-family="system-ui, sans-serif" font-size="10" font-weight="700">NO</text>
  <rect x="20" y="268" width="140" height="48" rx="24" fill="#1a0c0c" stroke="#7f1d1d" stroke-width="2"/>
  <text x="90" y="298" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="12" font-weight="900">WALK AWAY</text>

  <line x1="450" y1="319" x2="450" y2="346" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="338" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="10" font-weight="700">YES</text>

  <!-- Q3 -->
  <rect x="280" y="351" width="340" height="56" rx="10" fill="#171717" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="375" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="10" font-weight="900" letter-spacing="2">FILTER 3</text>
  <text x="450" y="395" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Is pricing posted on the website?</text>

  <line x1="620" y1="379" x2="735" y2="379" stroke="#7f1d1d" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="670" y="372" fill="#f87171" font-family="system-ui, sans-serif" font-size="10" font-weight="700">NO</text>
  <rect x="740" y="356" width="140" height="48" rx="24" fill="#1a0c0c" stroke="#7f1d1d" stroke-width="2"/>
  <text x="810" y="386" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="12" font-weight="900">WALK AWAY</text>

  <line x1="450" y1="407" x2="450" y2="434" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="426" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="10" font-weight="700">YES</text>

  <!-- Q4 -->
  <rect x="280" y="439" width="340" height="56" rx="10" fill="#171717" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="463" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="10" font-weight="900" letter-spacing="2">FILTER 4</text>
  <text x="450" y="483" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Does it solve a pain I already feel?</text>

  <line x1="280" y1="467" x2="165" y2="467" stroke="#7f1d1d" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="220" y="460" fill="#f87171" font-family="system-ui, sans-serif" font-size="10" font-weight="700">NO</text>
  <rect x="20" y="444" width="140" height="48" rx="24" fill="#1a0c0c" stroke="#7f1d1d" stroke-width="2"/>
  <text x="90" y="474" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="12" font-weight="900">WALK AWAY</text>

  <line x1="450" y1="495" x2="450" y2="522" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="514" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="10" font-weight="700">YES</text>

  <!-- verdict -->
  <rect x="250" y="527" width="400" height="44" rx="22" fill="#0c223d" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="555" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="900">NOW you can start a 14-day trial</text>
</svg>
