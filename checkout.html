<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checkout — RenewalEngineAI</title><style>body{font-family:Inter,system-ui;max-width:860px;margin:0 auto;padding:24px;background:#0f172a;color:#e2e8f0}.card{padding:24px;border:1px solid #334155;border-radius:12px;background:#1e293b}.plan-name{font-size:24px;font-weight:700;color:#ffffff;margin-bottom:8px}.plan-price{font-size:20px;color:#818cf8;font-weight:700;margin-bottom:16px}.btn{display:inline-block;background:#4f46e5;color:#ffffff;padding:14px 32px;border-radius:8px;font-weight:700;text-decoration:none;border:none;cursor:pointer;font-size:16px;transition:background 0.2s}.btn:hover{background:#4338ca}.back-link{color:#818cf8;text-decoration:none;font-weight:600;display:inline-block;margin-bottom:16px}.back-link:hover{color:#a5b4fc}.features{margin:16px 0;padding:0;list-style:none}.features li{padding:8px 0;border-bottom:1px solid #334155}.features li:last-child{border-bottom:none}.note{color:#94a3b8;font-size:14px;margin-top:16px}</style></head><body>
<a href="/offers.html" class="back-link">&larr; Back to Offers</a>
<h1>Checkout</h1>
<div class="card" id="checkout-card">
<div class="plan-name" id="plan-name">Loading...</div>
<div class="plan-price" id="plan-price"></div>
<div id="plan-desc"></div>
<ul class="features" id="plan-features"></ul>
<button class="btn" id="checkout-btn" onclick="handleCheckout()">Proceed to Payment</button>
<p class="note">Secure payment powered by Stripe. You'll be redirected to complete your purchase.</p>
</div>
<script>
var plans = {
  audit: {
    name: 'Agency Ops Audit',
    price: '$1,500',
    desc: '5-day bottleneck diagnosis + automation blueprint.',
    features: ['Full workflow analysis', 'Automation opportunity map', 'Revenue leakage report', 'Prioritized action plan', '1-hour strategy call']
  },
  sprint: {
    name: 'Build Sprint',
    price: '$6,000',
    desc: '2-week implementation of core agency workflows.',
    features: ['Custom AI automation build', 'AMS integration', 'Renewal campaign setup', 'Lead response automation', 'Team training session']
  },
  managed: {
    name: 'Managed Ops',
    price: '$2,500/mo',
    desc: 'Continuous optimization and execution management.',
    features: ['Ongoing AI optimization', 'Weekly KPI reporting', 'Dedicated ops manager', 'Priority support', 'Monthly strategy reviews']
  }
};

var params = new URLSearchParams(window.location.search);
var planKey = params.get('plan');
var plan = plans[planKey];

if (plan) {
  document.getElementById('plan-name').textContent = plan.name;
  document.getElementById('plan-price').textContent = plan.price;
  document.getElementById('plan-desc').textContent = plan.desc;
  var featuresEl = document.getElementById('plan-features');
  plan.features.forEach(function(f) {
    var li = document.createElement('li');
    li.textContent = '\u2713 ' + f;
    featuresEl.appendChild(li);
  });
} else {
  document.getElementById('checkout-card').innerHTML = '<p>No plan selected. <a href="/offers.html" style="color:#818cf8">View our offers</a></p>';
}

function handleCheckout() {
  var btn = document.getElementById('checkout-btn');
  btn.disabled = true;
  btn.textContent = 'Redirecting to Stripe...';
  // TODO: Replace with actual Stripe checkout session creation
  // fetch('/api/create-checkout-session', { method: 'POST', body: JSON.stringify({ plan: planKey }) })
  setTimeout(function() {
    btn.textContent = 'Stripe integration coming soon';
    btn.disabled = false;
  }, 1500);
}
</script>
</body></html>
