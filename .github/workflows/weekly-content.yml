name: Weekly Content Engine

on:
  schedule:
    # Mondays 13:00 UTC = 09:00 ET
    - cron: "0 13 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Write markdown locally only, no PR"
        required: false
        default: "false"
      no_research:
        description: "Skip Tavily research"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate weekly content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CONTENT_BASE_BRANCH: ${{ github.ref_name }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ "${{ github.event.inputs.no_research }}" = "true" ]; then
            FLAGS="$FLAGS --no-research"
          fi
          npx tsx scripts/generate-weekly-content.ts $FLAGS
